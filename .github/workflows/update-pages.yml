name: Update GitHub Pages

on:
  repository_dispatch:
    types: [update-pages]
  workflow_dispatch:
  workflow_run:
    workflows: ["Central Release"]
    types: [completed]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Fetch all releases from GitHub API
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mkdir -p _site
          gh api "repos/$GH_REPO/releases?per_page=100" > /tmp/all_releases.json
          echo "Fetched $(jq length /tmp/all_releases.json) releases"

      - name: Generate site
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # ── Load CSS and JS from source files ──
          CSS=$(cat .github/pages/style.css)
          JS=$(cat .github/pages/script.js)

          # ── Base path for GitHub Pages subpath ──
          BASE="/RISC-V-softwares"

          # ──────────────────────────────────────────────────────────
          # Load package metadata from packages.json
          #
          # To add a new package, edit .github/pages/packages.json only.
          # No changes needed anywhere else in this workflow.
          # ──────────────────────────────────────────────────────────
          PKGS_JSON=".github/pages/packages.json"

          if [ ! -f "$PKGS_JSON" ]; then
            echo "ERROR: $PKGS_JSON not found. Cannot generate site."
            exit 1
          fi

          declare -A PKG_LABEL
          declare -A PKG_CATEGORY
          declare -A PKG_DESC
          declare -A PKG_WORKFLOW
          declare -a ALL_PKGS

          while IFS= read -r line; do
            ID=$(echo "$line"       | jq -r '.id')
            LABEL=$(echo "$line"    | jq -r '.label')
            CAT=$(echo "$line"      | jq -r '.category')
            DESC=$(echo "$line"     | jq -r '.description')
            WF=$(echo "$line"       | jq -r '.workflow // ""')
            PKG_LABEL["$ID"]="$LABEL"
            PKG_CATEGORY["$ID"]="$CAT"
            PKG_DESC["$ID"]="$DESC"
            PKG_WORKFLOW["$ID"]="$WF"
            ALL_PKGS+=("$ID")
          done < <(jq -c '.packages[]' "$PKGS_JSON")

          echo "Loaded ${#ALL_PKGS[@]} packages from $PKGS_JSON:"
          printf '  %s\n' "${ALL_PKGS[@]}"

          # Build category list dynamically (order = first appearance in packages.json)
          declare -a ALL_CATEGORIES
          for PKG in "${ALL_PKGS[@]}"; do
            CAT="${PKG_CATEGORY[$PKG]}"
            if [[ ! " ${ALL_CATEGORIES[*]} " =~ " ${CAT} " ]]; then
              ALL_CATEGORIES+=("$CAT")
            fi
          done

          # ──────────────────────────────────────────────────────────
          # Build per-package release data from API
          #
          # FIX: Assets may live inside a central release whose tag
          # does NOT contain the package name. We therefore match on
          # the ASSET FILENAME, not the release tag.  We then group
          # all matching assets back under their parent release so
          # each release only appears once per package.
          # ──────────────────────────────────────────────────────────
          for PKG in "${ALL_PKGS[@]}"; do
            mkdir -p "_site/${PKG}"
            jq --arg pkg "$PKG" '
              # Collect releases that have at least one asset matching this pkg
              [
                .[] | {
                  tag:    .tag_name,
                  date:   .published_at,
                  url:    .html_url,
                  assets: [
                    .assets[]
                    | select(.name | ascii_downcase | contains($pkg))
                    | { name: .name, url: .browser_download_url, size: .size }
                  ]
                }
                | select(.assets | length > 0)
              ]
            ' /tmp/all_releases.json > "/tmp/${PKG}_releases.json"

            COUNT=$(jq 'length' "/tmp/${PKG}_releases.json")
            echo "  ${PKG}: ${COUNT} release(s) found"
          done

          # ──────────────────────────────────────────────────────────
          # Fetch workflow run history per package (for build log links)
          # We fetch the last 50 successful runs for each package's workflow
          # and store them so the per-version page can find the closest run
          # to each release date.
          # ──────────────────────────────────────────────────────────
          for PKG in "${ALL_PKGS[@]}"; do
            WF="${PKG_WORKFLOW[$PKG]}"
            if [ -z "$WF" ]; then
              echo "[]" > "/tmp/${PKG}_runs.json"
              continue
            fi
            echo "  Fetching runs for ${WF}..."
            gh api               "repos/$GH_REPO/actions/workflows/${WF}/runs?status=success&per_page=50"               --jq '[.workflow_runs[] | {id: .id, created_at: .created_at, html_url: .html_url}]'               > "/tmp/${PKG}_runs.json" 2>/dev/null || echo "[]" > "/tmp/${PKG}_runs.json"
          done

          # ──────────────────────────────────────────────────────────
          # Helper: emit the full HTML page shell
          # Args: $1 = page title, $2 = "true" to show grid/list btns
          # ──────────────────────────────────────────────────────────
          page_head() {
            local title="$1"
            local show_view_controls="${2:-false}"
            cat << HTMLHEAD
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>${title} — Cloud-V RISC-V Packages</title>
            <style>${CSS}</style>
            <script>${JS}</script>
          </head>
          <body>
          <header class="site-header">
            <div class="header-inner">
              <a class="site-logo" href="${BASE}/" style="color:inherit;text-decoration:none;">
                Cloud-V <span>/</span> RISC-V Packages
              </a>
              <div class="header-sub">Prebuilt binaries for RISC-V 64-bit Linux</div>
              <div class="header-spacer"></div>
              <div class="header-actions">
          HTMLHEAD
            if [ "$show_view_controls" = "true" ]; then
              echo '      <button class="view-btn" data-view="grid">&#x229E; Grid</button>'
              echo '      <button class="view-btn" data-view="list">&#x2261; List</button>'
            fi
            cat << HTMLHEAD2
                <button class="theme-btn" title="Toggle dark mode">
                  <span class="icon-dark">&#9790; Dark</span>
                  <span class="icon-light">&#9728; Light</span>
                </button>
              </div>
            </div>
          </header>
          HTMLHEAD2
          }

          page_foot() {
            cat << HTMLFOOT
          <div class="footer">
            Generated $(date -u '+%Y-%m-%d %H:%M UTC') &middot;
            <a href="https://github.com/${GH_REPO}">GitHub</a> &middot; Cloud-V
          </div>
          </body>
          </html>
          HTMLFOOT
          }

          # ──────────────────────────────────────────────────────────
          # INDEX PAGE
          # ──────────────────────────────────────────────────────────
          {
            page_head "Package Index" "true"
            cat << HTML
          <div class="container">
            <div class="breadcrumb">
              <a href="${BASE}/">cloud-v-10xe.github.io/RISC-V-softwares</a>
            </div>
            <h1>RISC-V Package Archive</h1>
            <p class="page-desc">
              Prebuilt binaries for RISC-V 64-bit Linux (riscv64).
              All packages are built from upstream sources on native RISC-V hardware.
            </p>
            <div class="updated">Last updated: $(date -u '+%Y-%m-%d %H:%M UTC')</div>
            <div class="search-wrap">
              <span class="search-icon">&#128269;</span>
              <input class="search-input" id="pkg-search" type="text"
                placeholder="Search packages — e.g. gcc, pytorch, nodejs..."
                autocomplete="off">
            </div>
            <div class="no-results" id="no-results">No packages match your search.</div>
          HTML

            for CAT in "${ALL_CATEGORIES[@]}"; do
              echo "<div class='category-section'>"
              echo "<div class='category-label'>${CAT}</div>"
              echo "<div class='pkg-grid'>"
              for PKG in "${ALL_PKGS[@]}"; do
                if [ "${PKG_CATEGORY[$PKG]}" = "$CAT" ]; then
                  LATEST=$(jq -r '.[0].tag // ""' "/tmp/${PKG}_releases.json" 2>/dev/null || echo "")
                  COUNT=$(jq 'length' "/tmp/${PKG}_releases.json" 2>/dev/null || echo "0")
                  cat << CARD
          <a class="pkg-card"
             href="${BASE}/${PKG}/"
             data-name="${PKG}"
             data-desc="${PKG_DESC[$PKG]}"
             data-cat="${CAT}">
            <div class="pkg-card-name">${PKG_LABEL[$PKG]}</div>
            <div class="pkg-card-desc">${PKG_DESC[$PKG]}</div>
            <div class="pkg-card-meta">
          CARD
                  if [ -n "$LATEST" ]; then
                    echo "    <span class='badge badge-green'>${LATEST}</span>"
                  fi
                  echo "    <span class='badge'>${COUNT} release(s)</span>"
                  echo "  </div></a>"
                fi
              done
              echo "</div></div>"
            done

            echo "</div>"
            page_foot
          } > _site/index.html

          # ──────────────────────────────────────────────────────────
          # PER-PACKAGE PAGE  e.g. /gcc/
          # ──────────────────────────────────────────────────────────
          for PKG in "${ALL_PKGS[@]}"; do
            LABEL="${PKG_LABEL[$PKG]}"
            DESC="${PKG_DESC[$PKG]}"
            RELEASES_FILE="/tmp/${PKG}_releases.json"
            COUNT=$(jq 'length' "$RELEASES_FILE" 2>/dev/null || echo "0")

            {
              page_head "$LABEL" "false"
              cat << HTML
          <div class="container">
            <div class="breadcrumb">
              <a href="${BASE}/">index</a><span>/</span>${PKG}
            </div>
            <h1>${LABEL}</h1>
            <p class="page-desc">${DESC}</p>
          HTML

              # About block from docs/
              if [ -f "docs/${PKG}/README.md" ]; then
                echo "<div class='section-title'>About</div>"
                echo "<div class='doc-block'>"
                grep -v '^#' "docs/${PKG}/README.md" | sed '/^$/d' | head -5 | while read -r LINE; do
                  echo "<p>${LINE}</p>"
                done
                echo "</div>"
              fi

              # Releases table
              echo "<div class='section-title'>Releases (${COUNT})</div>"
              if [ "$COUNT" -gt 0 ]; then
                echo "<table><thead><tr>"
                echo "  <th>Release Tag</th><th>Date</th><th>Assets</th><th></th>"
                echo "</tr></thead><tbody>"
                jq -r '.[] | "\(.tag)\t\(.date)\t\(.url)\t\(.assets | length)"' "$RELEASES_FILE" \
                  | while IFS=$'\t' read -r TAG DATE RURL NASSETS; do
                    DATESTR=$(echo "$DATE" | cut -c1-10)
                    cat << ROW
          <tr>
            <td><span class="mono">${TAG}</span></td>
            <td><span class="mono">${DATESTR}</span></td>
            <td><span class="badge">${NASSETS} file(s)</span></td>
            <td><a class="dl-btn" href="${BASE}/${PKG}/${TAG}/">view &rarr;</a></td>
          </tr>
          ROW
                  done
                echo "</tbody></table>"
              else
                echo "<p style='color:var(--text-muted);font-size:13px;padding:16px 0;'>"
                echo "  No releases found yet. Check back after the next build."
                echo "</p>"
              fi

              echo "</div>"
              page_foot
            } > "_site/${PKG}/index.html"

            # ──────────────────────────────────────────────────────
            # ──────────────────────────────────────────────────────
            # PER-VERSION PAGE  e.g. /gcc/v14.2.0/
            # ──────────────────────────────────────────────────────
            jq -c '.[]' "$RELEASES_FILE" | while read -r RELEASE; do
              TAG=$(echo "$RELEASE"   | jq -r '.tag')
              DATE=$(echo "$RELEASE"  | jq -r '.date' | cut -c1-10)
              RDATE=$(echo "$RELEASE" | jq -r '.date')
              RURL=$(echo "$RELEASE"  | jq -r '.url')

              mkdir -p "_site/${PKG}/${TAG}"

              # ── Find closest successful workflow run to this release date ──
              # Converts both timestamps to epoch and picks the run with
              # the smallest absolute time difference.
              RUNS_FILE="/tmp/${PKG}_runs.json"
              LOG_URL=""
              if [ -s "$RUNS_FILE" ] && [ "$(jq 'length' "$RUNS_FILE")" -gt 0 ]; then
                RDATE_EPOCH=$(date -d "$RDATE" +%s 2>/dev/null || echo "0")
                LOG_URL=$(jq -r --argjson epoch "$RDATE_EPOCH" '
                  map(. + {diff: ((.created_at | fromdateiso8601) - $epoch | fabs)})
                  | sort_by(.diff)
                  | .[0].html_url // ""
                ' "$RUNS_FILE")
              fi

              {
                page_head "${LABEL} ${TAG}" "false"
                cat << HTML
          <div class="container">
            <div class="breadcrumb">
              <a href="${BASE}/">index</a><span>/</span>
              <a href="${BASE}/${PKG}/">${PKG}</a><span>/</span>${TAG}
            </div>
            <h1>${LABEL} <span style="font-weight:300;color:var(--text-muted)">${TAG}</span></h1>
            <p class="page-desc">
              Released ${DATE} &middot;
              <a href="${RURL}">View GitHub Release</a>
          HTML
                if [ -n "$LOG_URL" ] && [ "$LOG_URL" != "null" ]; then
                  echo "    &middot; <a href='${LOG_URL}'>&#128196; Build Logs</a>"
                fi
                echo "    </p>"

                # Downloads table — Filename / Size / Download / Build Log
                echo "<div class='section-title'>Downloads</div>"
                echo "<table><thead><tr>"
                echo "  <th>Filename</th><th>Size</th><th>Download</th><th>Build Log</th>"
                echo "</tr></thead><tbody>"
                echo "$RELEASE" | jq -r '.assets[] | "\(.name)\t\(.size)\t\(.url)"' \
                  | while IFS=$'\t' read -r FNAME FSIZE FURL; do
                    if [ "$FSIZE" -gt 1048576 ]; then
                      HSIZE="$(echo "scale=1; $FSIZE/1048576" | bc) MB"
                    elif [ "$FSIZE" -gt 1024 ]; then
                      HSIZE="$(echo "scale=1; $FSIZE/1024" | bc) KB"
                    else
                      HSIZE="${FSIZE} B"
                    fi
                    LOG_CELL="<span style='color:var(--text-faint);font-size:12px;font-family:var(--mono)'>—</span>"
                    if [ -n "$LOG_URL" ] && [ "$LOG_URL" != "null" ]; then
                      LOG_CELL="<a class='log-btn' href='${LOG_URL}'>&#128196; log</a>"
                    fi
                    cat << ROW
          <tr>
            <td><span class="mono">${FNAME}</span></td>
            <td><span class="mono" style="color:var(--text-muted)">${HSIZE}</span></td>
            <td><a class="dl-btn" href="${FURL}">download</a></td>
            <td>${LOG_CELL}</td>
          </tr>
          ROW
                  done
                echo "</tbody></table>"


                # Installation instructions
                FIRST_ASSET=$(echo "$RELEASE" | jq -r '.assets[0].name // ""')
                FIRST_URL=$(echo "$RELEASE"   | jq -r '.assets[0].url  // ""')
                if [ -n "$FIRST_URL" ]; then
                  echo "<div class='section-title'>Installation</div>"
                  echo "<div class='install-block'><code>"
                  echo "<span class='comment'># Download</span>"
                  echo "wget ${FIRST_URL}"
                  if echo "$FIRST_ASSET" | grep -q "\.tar\.gz$"; then
                    printf '\n<span class="comment"># Extract</span>\n'
                    echo "tar -xzf ${FIRST_ASSET}"
                    printf '\n<span class="comment"># Install to /usr/local</span>\n'
                    echo "sudo cp -r * /usr/local/"
                  elif echo "$FIRST_ASSET" | grep -q "\.whl$"; then
                    printf '\n<span class="comment"># Install Python wheel</span>\n'
                    echo "pip install ${FIRST_ASSET}"
                  else
                    printf '\n<span class="comment"># Make executable and move to PATH</span>\n'
                    echo "chmod +x ${FIRST_ASSET}"
                    echo "sudo mv ${FIRST_ASSET} /usr/local/bin/"
                  fi
                  echo "</code></div>"
                fi

                # Documentation block
                if [ -f "docs/${PKG}/README.md" ]; then
                  echo "<div class='section-title'>Documentation</div>"
                  echo "<div class='doc-block'>"
                  grep -v '^#' "docs/${PKG}/README.md" | grep -v '^```' | sed '/^$/d' | head -30 \
                    | while read -r LINE; do echo "<p>${LINE}</p>"; done
                  echo "</div>"
                fi

                echo "</div>"
                page_foot
              } > "_site/${PKG}/${TAG}/index.html"
            done
          done

          echo "Site generation complete."
          find _site -name "*.html" | wc -l | xargs echo "Total HTML files:"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
