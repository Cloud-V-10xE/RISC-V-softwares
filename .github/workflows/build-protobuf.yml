name: Build Protobuf for RISC-V

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

jobs:
  build:
    runs-on: RISCV64
    permissions:
      contents: write
    outputs:
      asset_name: ${{ steps.set-outputs.outputs.asset_name }}
      asset_path: ${{ steps.set-outputs.outputs.asset_path }}

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            jq \
            cmake \
            ninja-build \
            zlib1g-dev

      - name: Clean workspace with elevated permissions
        run: |
          sudo rm -rf "$GITHUB_WORKSPACE"
          mkdir -p "$GITHUB_WORKSPACE"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Get latest Protobuf version
        id: get-version
        run: |
          LATEST=$(curl -s https://api.github.com/repos/protocolbuffers/protobuf/releases/latest \
            | jq -r '.tag_name')
          VERSION="${LATEST#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest Protobuf: $LATEST"

      - name: Clone Protobuf
        run: |
          git clone --depth=1 \
            --branch "${{ steps.get-version.outputs.tag }}" \
            https://github.com/protocolbuffers/protobuf.git \
            "$GITHUB_WORKSPACE/protobuf-src"
          cd "$GITHUB_WORKSPACE/protobuf-src"
          # Must explicitly init abseil submodule — protobuf bundles its own
          # version which is newer than what apt ships on Ubuntu Noble
          git submodule update --init --depth=1 \
            third_party/abseil-cpp \
            third_party/jsoncpp \
            third_party/utf8_range

      - name: Build Protobuf
        run: |
          cd "$GITHUB_WORKSPACE/protobuf-src"
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/protobuf-install" \
            -DCMAKE_CXX_STANDARD=17 \
            -DABSL_PROPAGATE_CXX_STD=ON \
            -Dprotobuf_BUILD_TESTS=OFF \
            -G Ninja
          cmake --build build --parallel $(nproc)
          cmake --install build

      - name: Verify
        run: |
          "$GITHUB_WORKSPACE/protobuf-install/bin/protoc" --version

      - name: Set outputs
        id: set-outputs
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          ASSET_NAME="protobuf-${VERSION}-riscv64-linux.tar.gz"
          ASSET_PATH="$GITHUB_WORKSPACE/${ASSET_NAME}"
          echo "asset_name=$ASSET_NAME" >> "$GITHUB_OUTPUT"
          echo "asset_path=$ASSET_PATH" >> "$GITHUB_OUTPUT"

      - name: Package
        run: |
          tar -czf "${{ steps.set-outputs.outputs.asset_path }}" \
            -C "$GITHUB_WORKSPACE/protobuf-install" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-outputs.outputs.asset_name }}
          path: ${{ steps.set-outputs.outputs.asset_path }}
