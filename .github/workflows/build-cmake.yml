name: Build CMake for RISC-V

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 2 * *"

jobs:
  build:
    runs-on: RISCV64
    permissions:
      contents: write
    outputs:
      asset_name: ${{ steps.set-outputs.outputs.asset_name }}
      asset_path: ${{ steps.set-outputs.outputs.asset_path }}

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            wget \
            libssl-dev \
            libcurl4-openssl-dev \
            zlib1g-dev \
            python3

      - name: Clean workspace with elevated permissions
        run: |
          sudo rm -rf "$GITHUB_WORKSPACE"
          mkdir -p "$GITHUB_WORKSPACE"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Get latest CMake version
        id: get-version
        run: |
          LATEST=$(curl -s https://api.github.com/repos/Kitware/CMake/releases/latest \
            | jq -r '.tag_name')
          VERSION="${LATEST#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest CMake: $LATEST"

      - name: Clone CMake
        run: |
          git clone --depth=1 \
            --branch "${{ steps.get-version.outputs.tag }}" \
            https://github.com/Kitware/CMake.git \
            "$GITHUB_WORKSPACE/cmake-src"

      - name: Build CMake
        run: |
          cd "$GITHUB_WORKSPACE/cmake-src"
          # Bootstrap CMake using its own bootstrap script — no CMake needed
          ./bootstrap \
            --prefix="$GITHUB_WORKSPACE/cmake-install" \
            --parallel=$(nproc)
          make -j$(nproc)
          make install

      - name: Verify
        run: |
          "$GITHUB_WORKSPACE/cmake-install/bin/cmake" --version

      - name: Set outputs
        id: set-outputs
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          ASSET_NAME="cmake-${VERSION}-riscv64-linux.tar.gz"
          ASSET_PATH="$GITHUB_WORKSPACE/${ASSET_NAME}"
          echo "asset_name=$ASSET_NAME" >> "$GITHUB_OUTPUT"
          echo "asset_path=$ASSET_PATH" >> "$GITHUB_OUTPUT"

      - name: Package
        run: |
          tar -czf "${{ steps.set-outputs.outputs.asset_path }}" \
            -C "$GITHUB_WORKSPACE/cmake-install" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-outputs.outputs.asset_name }}
          path: ${{ steps.set-outputs.outputs.asset_path }}

      - name: Trigger Pages update
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: update-pages
