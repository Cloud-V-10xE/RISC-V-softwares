name: Build Go for RISC-V

on:
  workflow_dispatch:
  push:
  schedule:
    - cron: "0 0 1 * *"

jobs:
  build:
    runs-on: RISCV64
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.get-latest-tag.outputs.tag_name }}
      release_name: ${{ steps.get-version.outputs.release_name }}
      asset_name: ${{ steps.get-version.outputs.asset_name }}
      asset_path: ${{ steps.get-version.outputs.asset_path }}

    steps:
      - name: Install dependencies
        run: |
         export DEBIAN_FRONTEND=noninteractive
         sudo apt-get update
         sudo apt-get install -y \
           build-essential \
           golang \
           git \
           autoconf \
           automake \
           wget \
           make \
           python3


      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Check environment
        run: |
          set -eux
          uname -a
          gcc --version
          g++ --version
          ldd --version

      - name: Clone Go from and checkout latest tag
        id: get-latest-tag
        run: |
          set -eux

          # Tweak Git to be more resilient on CI
          git config --global http.version HTTP/2
          git config https.postBuffer 1048576000
          git config http.postBuffer 1048576000


          rm -rf go
          git clone --depth=1 --no-tags https://go.googlesource.com/go
          cd go

          # Fetch only tag references (without full history)
          git fetch --tags --depth=1
          git submodule update --recursive --remote

          LATEST_TAG=$(git tag -l "go*" | sort -V | tail -n 1)
          echo "Checking out $LATEST_TAG"

          # Fetch and checkout just that tag commit (still shallow)
          git fetch --depth=1 origin tag $LATEST_TAG
          git checkout FETCH_HEAD

          echo "tag_name=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      
      - name: Build
        run: |
          cd go/src
          export GOMAXPROCS=4
          ./all.bash

      - name: Verify installation
        run: |
          ./go/bin/go version

      - name: Get Go version and set outputs
        id: get-version
        run: |
          GO_VERSION=$($GITHUB_WORKSPACE/go/bin/go version | awk '{print substr($3,3)}')
          ASSET_NAME="go-${GO_VERSION}-riscv64-linux.tar.gz"
          ASSET_PATH="$GITHUB_WORKSPACE/${ASSET_NAME}"

          echo "release_name=Go ${GO_VERSION} RISC-V" >> $GITHUB_OUTPUT
          echo "asset_name=$ASSET_NAME" >> $GITHUB_OUTPUT
          echo "asset_path=$ASSET_PATH" >> $GITHUB_OUTPUT

      - name: Package binaries
        run: |
          tar -czf ${{ steps.get-version.outputs.asset_path }} -C ${{ github.workspace }}/go .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.get-version.outputs.asset_name }}
          path: ${{ steps.get-version.outputs.asset_path }}

      - name: Create or push to tag
        run: |
          TAG=${{ steps.get-latest-tag.outputs.tag_name }}

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "✅ Tag $TAG already exists. Skipping tag creation." 
          else
            echo "🆕 Tag $TAG does not exist. Creating and pushing..."
            git tag "$TAG"
            git push origin "$TAG"
          fi
