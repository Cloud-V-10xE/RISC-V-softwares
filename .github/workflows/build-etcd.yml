name: Build etcd Images for RISC-V and x86

on:
  workflow_dispatch:
    inputs:
      etcd_version:
        description: 'etcd version (e.g., v3.5.17)'
        required: false
        default: 'latest'
  schedule:
    - cron: "0 0 12 * *"

env:
  REGISTRY: ghcr.io

jobs:
  get-versions:
    runs-on: ubuntu-latest
    outputs:
      etcd_version: ${{ steps.versions.outputs.etcd_version }}
      etcd_tag: ${{ steps.versions.outputs.etcd_tag }}
      image_repo: ${{ steps.versions.outputs.image_repo }}
    steps:
      - name: Get latest versions
        id: versions
        run: |
          if [ "${{ github.event.inputs.etcd_version }}" = "latest" ] || [ -z "${{ github.event.inputs.etcd_version }}" ]; then
            ETCD_VERSION=$(curl -s https://api.github.com/repos/etcd-io/etcd/releases/latest | jq -r '.tag_name')
          else
            ETCD_VERSION="${{ github.event.inputs.etcd_version }}"
          fi

          ETCD_TAG="${ETCD_VERSION#v}"

          # Lowercase the repo owner — GHCR requires all image names to be lowercase
          IMAGE_REPO="ghcr.io/$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"

          echo "etcd_version=$ETCD_VERSION" >> "$GITHUB_OUTPUT"
          echo "etcd_tag=$ETCD_TAG" >> "$GITHUB_OUTPUT"
          echo "image_repo=$IMAGE_REPO" >> "$GITHUB_OUTPUT"

          echo "Building etcd: $ETCD_VERSION"

  build-etcd-x86:
    needs: get-versions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone etcd repository
        run: |
          rm -rf etcd
          git clone --depth=1 \
            --branch "${{ needs.get-versions.outputs.etcd_version }}" \
            https://github.com/etcd-io/etcd.git

      - name: Build and push etcd for x86_64
        run: |
          cd etcd
          ./scripts/build.sh

          mkdir -p /tmp/etcd-build

          cat > /tmp/etcd-build/Dockerfile << 'EOF'
          FROM debian:trixie-slim
          RUN apt-get update && \
              apt-get install -y ca-certificates && \
              rm -rf /var/lib/apt/lists/*
          COPY etcd /usr/local/bin/etcd
          COPY etcdctl /usr/local/bin/etcdctl
          COPY etcdutl /usr/local/bin/etcdutl
          RUN chmod +x /usr/local/bin/etcd* && \
              mkdir -p /var/etcd /var/lib/etcd
          EXPOSE 2379 2380
          VOLUME /var/etcd /var/lib/etcd
          ENTRYPOINT ["/usr/local/bin/etcd"]
          EOF

          cp bin/etcd bin/etcdctl bin/etcdutl /tmp/etcd-build/

          cd /tmp/etcd-build
          docker build \
            --tag "${{ needs.get-versions.outputs.image_repo }}/etcd:${{ needs.get-versions.outputs.etcd_tag }}-amd64" \
            --tag "${{ needs.get-versions.outputs.image_repo }}/etcd:latest-amd64" \
            .

          docker push "${{ needs.get-versions.outputs.image_repo }}/etcd:${{ needs.get-versions.outputs.etcd_tag }}-amd64"
          docker push "${{ needs.get-versions.outputs.image_repo }}/etcd:latest-amd64"

  build-etcd-riscv:
    needs: get-versions
    runs-on: RISCV64
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u "${{ github.actor }}" --password-stdin

      - name: Setup Go
        run: |
          sudo apt update && sudo apt install -y golang

      - name: Clean workspace with elevated permissions
        run: |
          sudo rm -rf "$GITHUB_WORKSPACE"
          mkdir -p "$GITHUB_WORKSPACE"

      - name: Clone etcd repository
        run: |
          git clone --depth=1 \
            --branch "${{ needs.get-versions.outputs.etcd_version }}" \
            https://github.com/etcd-io/etcd.git \
            "$GITHUB_WORKSPACE/etcd"

      - name: Build and push etcd for RISC-V
        run: |
          cd "$GITHUB_WORKSPACE/etcd"
          GOARCH=riscv64 ./scripts/build.sh

          mkdir -p /tmp/etcd-build

          cat > /tmp/etcd-build/Dockerfile << 'EOF'
          FROM riscv64/debian:trixie-slim
          RUN apt-get update && \
              apt-get install -y ca-certificates && \
              rm -rf /var/lib/apt/lists/*
          COPY etcd /usr/local/bin/etcd
          COPY etcdctl /usr/local/bin/etcdctl
          COPY etcdutl /usr/local/bin/etcdutl
          RUN chmod +x /usr/local/bin/etcd* && \
              mkdir -p /var/etcd /var/lib/etcd
          ENV ETCD_UNSUPPORTED_ARCH=riscv64
          EXPOSE 2379 2380
          VOLUME /var/etcd /var/lib/etcd
          ENTRYPOINT ["/usr/local/bin/etcd"]
          EOF

          cp bin/etcd bin/etcdctl bin/etcdutl /tmp/etcd-build/

          cd /tmp/etcd-build
          docker build \
            --tag "${{ needs.get-versions.outputs.image_repo }}/etcd:${{ needs.get-versions.outputs.etcd_tag }}-riscv64" \
            --tag "${{ needs.get-versions.outputs.image_repo }}/etcd:latest-riscv64" \
            .

          docker push "${{ needs.get-versions.outputs.image_repo }}/etcd:${{ needs.get-versions.outputs.etcd_tag }}-riscv64"
          docker push "${{ needs.get-versions.outputs.image_repo }}/etcd:latest-riscv64"

  create-manifests:
    needs: [get-versions, build-etcd-x86, build-etcd-riscv]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create etcd multi-arch manifest
        run: |
          docker manifest rm \
            "${{ needs.get-versions.outputs.image_repo }}/etcd:${{ needs.get-versions.outputs.etcd_tag }}" \
            2>/dev/null || true
          docker manifest rm \
            "${{ needs.get-versions.outputs.image_repo }}/etcd:latest" \
            2>/dev/null || true

          docker manifest create \
            "${{ needs.get-versions.outputs.image_repo }}/etcd:${{ needs.get-versions.outputs.etcd_tag }}" \
            "${{ needs.get-versions.outputs.image_repo }}/etcd:${{ needs.get-versions.outputs.etcd_tag }}-amd64" \
            "${{ needs.get-versions.outputs.image_repo }}/etcd:${{ needs.get-versions.outputs.etcd_tag }}-riscv64"

          docker manifest push \
            "${{ needs.get-versions.outputs.image_repo }}/etcd:${{ needs.get-versions.outputs.etcd_tag }}"

          docker manifest create \
            "${{ needs.get-versions.outputs.image_repo }}/etcd:latest" \
            "${{ needs.get-versions.outputs.image_repo }}/etcd:latest-amd64" \
            "${{ needs.get-versions.outputs.image_repo }}/etcd:latest-riscv64"

          docker manifest push \
            "${{ needs.get-versions.outputs.image_repo }}/etcd:latest"
