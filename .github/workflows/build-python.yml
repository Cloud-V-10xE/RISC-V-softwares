name: Build Python for RISC-V

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

jobs:
  build:
    runs-on: RISCV64
    permissions:
      contents: write
    outputs:
      asset_name: ${{ steps.set-outputs.outputs.asset_name }}
      asset_path: ${{ steps.set-outputs.outputs.asset_path }}

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            wget \
            jq \
            libssl-dev \
            zlib1g-dev \
            libbz2-dev \
            libreadline-dev \
            libsqlite3-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libffi-dev \
            liblzma-dev \
            uuid-dev \
            libgdbm-dev \
            tk-dev

      - name: Clean workspace with elevated permissions
        run: |
          sudo rm -rf "$GITHUB_WORKSPACE"
          mkdir -p "$GITHUB_WORKSPACE"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Get latest Python 3.13 version
        id: get-version
        run: |
          # Use git tags API — more reliable than releases API for finding
          # specific version branches when newer major versions are active.
          # Fetches tags matching v3.13.* sorted by version, picks latest.
          LATEST=$(curl -s "https://api.github.com/repos/python/cpython/git/refs/tags" \
            | jq -r '[.[] | .ref | ltrimstr("refs/tags/") | select(startswith("v3.13."))] | last')
          VERSION="${LATEST#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest Python: $LATEST"

      - name: Clone CPython
        run: |
          git clone --depth=1 \
            --branch "${{ steps.get-version.outputs.tag }}" \
            https://github.com/python/cpython.git \
            "$GITHUB_WORKSPACE/cpython"

      - name: Build Python
        run: |
          cd "$GITHUB_WORKSPACE/cpython"
          ./configure \
            --prefix="$GITHUB_WORKSPACE/python-install" \
            --enable-optimizations \
            --with-ensurepip=install \
            --enable-shared \
            LDFLAGS="-Wl,-rpath,$GITHUB_WORKSPACE/python-install/lib"
          make -j$(nproc)
          make install

      - name: Verify
        run: |
          "$GITHUB_WORKSPACE/python-install/bin/python3" --version
          "$GITHUB_WORKSPACE/python-install/bin/pip3" --version

      - name: Set outputs
        id: set-outputs
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          ASSET_NAME="python-${VERSION}-riscv64-linux.tar.gz"
          ASSET_PATH="$GITHUB_WORKSPACE/${ASSET_NAME}"
          echo "asset_name=$ASSET_NAME" >> "$GITHUB_OUTPUT"
          echo "asset_path=$ASSET_PATH" >> "$GITHUB_OUTPUT"

      - name: Package
        run: |
          tar -czf "${{ steps.set-outputs.outputs.asset_path }}" \
            -C "$GITHUB_WORKSPACE/python-install" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-outputs.outputs.asset_name }}
          path: ${{ steps.set-outputs.outputs.asset_path }}
