name: Central Release
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set release date
        id: date
        run: |
          RELEASE_DATE=$(date +%Y-%m-%d)
          echo "release_date=$RELEASE_DATE" >> "$GITHUB_OUTPUT"

      - name: Install GitHub CLI and jq
        run: |
          sudo apt update
          sudo apt install -y gh jq

      - name: Load package list from packages.json
        id: pkgs
        run: |
          PKGS_JSON=".github/pages/packages.json"

          if [ ! -f "$PKGS_JSON" ]; then
            echo "ERROR: $PKGS_JSON not found."
            exit 1
          fi

          # Extract workflows and ids for packages where central_release == true
          WORKFLOWS=$(jq -r '.packages[] | select(.central_release == true) | .workflow' "$PKGS_JSON")
          IDS=$(jq -r '.packages[] | select(.central_release == true) | .id' "$PKGS_JSON")

          echo "Packages included in central release:"
          echo "$IDS"

          # Write to files so next steps can read them
          echo "$WORKFLOWS" > /tmp/cr_workflows.txt
          echo "$IDS"       > /tmp/cr_ids.txt

      - name: Download latest artifacts dynamically
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mkdir -p release_assets

          FAILED_WORKFLOWS=()

          while IFS= read -r WF; do
            [ -z "$WF" ] && continue
            echo "──────────────────────────────────────"
            echo "Processing workflow: $WF"

            LATEST_RUN_ID=$(gh run list \
              --repo "$GH_REPO" \
              --workflow="$WF" \
              --branch=main \
              --limit 20 \
              --json databaseId,status,conclusion \
              | jq -r '.[] | select(.status=="completed" and .conclusion=="success") | .databaseId' \
              | head -n1)

            if [ -z "$LATEST_RUN_ID" ]; then
              echo "⚠️  No successful run found for $WF, skipping"
              FAILED_WORKFLOWS+=("$WF")
              continue
            fi

            echo "✅ Found run ID: $LATEST_RUN_ID for $WF"

            ARTIFACTS=$(gh api \
              "repos/$GH_REPO/actions/runs/$LATEST_RUN_ID/artifacts" \
              | jq -r '.artifacts[].name')

            if [ -z "$ARTIFACTS" ]; then
              echo "⚠️  No artifacts found for run $LATEST_RUN_ID of $WF"
              FAILED_WORKFLOWS+=("$WF")
              continue
            fi

            for ART in $ARTIFACTS; do
              echo "  ⬇️  Downloading: $ART"
              gh run download "$LATEST_RUN_ID" \
                --repo "$GH_REPO" \
                --name "$ART" \
                -D release_assets
            done

          done < /tmp/cr_workflows.txt

          if [ ${#FAILED_WORKFLOWS[@]} -gt 0 ]; then
            echo ""
            echo "⚠️  The following workflows had no successful runs:"
            for WF in "${FAILED_WORKFLOWS[@]}"; do
              echo "   - $WF"
            done
          fi

      - name: List downloaded artifacts
        run: |
          echo "Contents of release_assets:"
          ls -lh release_assets/

      - name: Verify all expected artifacts are present
        id: verify
        run: |
          MISSING_LIST=()

          while IFS= read -r ID; do
            [ -z "$ID" ] && continue
            if ! ls release_assets/ | grep -qi "$ID"; then
              echo "⚠️  Missing artifact: $ID"
              MISSING_LIST+=("$ID")
            else
              echo "✅ Found artifact: $ID"
            fi
          done < /tmp/cr_ids.txt

          if [ ${#MISSING_LIST[@]} -gt 0 ]; then
            echo ""
            echo "⚠️  Missing artifacts: ${MISSING_LIST[*]}"
            echo "missing_artifacts=${MISSING_LIST[*]}" >> "$GITHUB_OUTPUT"
            echo "all_present=false" >> "$GITHUB_OUTPUT"
          else
            echo ""
            echo "✅ All expected artifacts are present"
            echo "all_present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release notes
        id: release-notes
        run: |
          RELEASE_DATE="${{ steps.date.outputs.release_date }}"
          ALL_PRESENT="${{ steps.verify.outputs.all_present }}"
          MISSING="${{ steps.verify.outputs.missing_artifacts }}"

          ARTIFACT_DETAILS=""
          for FILE in release_assets/*; do
            FNAME=$(basename "$FILE")
            FSIZE=$(du -sh "$FILE" | cut -f1)
            ARTIFACT_DETAILS="${ARTIFACT_DETAILS}\n- \`${FNAME}\` (${FSIZE})"
          done

          if [ "$ALL_PRESENT" = "true" ]; then
            STATUS_LINE="✅ All expected artifacts included."
          else
            STATUS_LINE="⚠️ Some artifacts were missing and excluded: \`${MISSING}\`"
          fi

          # Build workflow table dynamically from packages.json
          PKGS_JSON=".github/pages/packages.json"
          WF_TABLE=""
          while IFS= read -r row; do
            ID=$(echo "$row"    | jq -r '.id')
            LABEL=$(echo "$row" | jq -r '.label')
            WF=$(echo "$row"    | jq -r '.workflow')
            WF_TABLE="${WF_TABLE}| ${WF} | ${LABEL} |\n"
          done < <(jq -c '.packages[] | select(.central_release == true)' "$PKGS_JSON")

          cat << EOF > release_notes.md
          ## RISC-V Binaries — $RELEASE_DATE

          Central release bundling the latest successful builds from all RISC-V build workflows.

          ### Included Artifacts
          $(echo -e "$ARTIFACT_DETAILS")

          ### Build Status
          $STATUS_LINE

          ### Workflows
          | Workflow | Package |
          |----------|---------|
          $(echo -e "$WF_TABLE")

          ---
          *Generated automatically by the Central Release workflow.*
          EOF

          cat release_notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ steps.date.outputs.release_date }}
          name: RISC-V Release ${{ steps.date.outputs.release_date }}
          body_path: release_notes.md
          files: release_assets/*
          make_latest: true
